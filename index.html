<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентація | Статистика</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .card {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px 25px;
            text-align: center;
        }
        .header h1 { font-size: 1.6rem; margin-bottom: 6px; }
        .header p { opacity: 0.85; font-size: 0.9rem; }
        .toolbar {
            padding: 15px 25px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        .pdf-container {
            flex: 1;
            min-height: 70vh;
            position: relative;
            background: #f0f2f5;
        }
        .pdf-container embed, .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 20px;
            display: none;
        }
        .footer {
            padding: 12px;
            text-align: center;
            color: #6c757d;
            font-size: 0.8rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.3rem; }
            .pdf-container { min-height: 60vh; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📊 Презентація: Основи статистики</h1>
            <p>Для комфортного перегляду натисніть F11 (повноекранний режим)</p>
        </div>
        
        <div class="toolbar">
            <a href="presentation.pdf" download class="btn">📥 Завантажити PDF</a>
            <a href="presentation.pdf" target="_blank" class="btn btn-outline">🔗 Відкрити на весь екран</a>
        </div>

        <div class="pdf-container">
            <embed src="presentation.pdf" type="application/pdf" name="pdf-viewer">
            <!-- Резервний варіант для старих браузерів -->
            <div class="fallback" id="fallback">
                <p>📄 Ваш браузер не підтримує вбудований перегляд PDF.</p>
                <a href="presentation.pdf" download class="btn" style="margin-top: 10px;">Завантажити файл</a>
            </div>
        </div>

        <div class="footer">
            Матеріали для колоквіуму | Кафедра статистики | 2026
        </div>
    </div>

    <script>
        // Проста перевірка: якщо embed не завантажився за 2 сек, показуємо fallback
        setTimeout(() => {
            const embed = document.querySelector('embed');
            if (!embed || embed.clientHeight === 0) {
                document.getElementById('fallback').style.display = 'block';
            }
        }, 2000);
    </script>
</body>
</html>
